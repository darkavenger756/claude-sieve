name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          pip install ruff
          ruff check claude_sieve/
      - name: Type check
        run: |
          pip install mypy
          mypy claude_sieve/ || true
      - name: Test with pytest
        run: |
          pip install pytest
          python -m pytest tests/ -v || true
      - name: Integration smoke test
        run: |
          clavesieve --version
          clavesieve --output compact --framework pytest -- sh -c 'echo "FAILED test"; exit 1'
